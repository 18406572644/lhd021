services:
  mysql:
    image: mysql:8.0.33
    container_name: idle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: idle_mutual_aid
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idle-backend
    restart: unless-stopped
    ports:
      - "6021:6021"
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources:/app/resources

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: idle-frontend
    restart: unless-stopped
    ports:
      - "2021:2021"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - backend

volumes:
  mysql-data:
